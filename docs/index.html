<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - DeskHub</title>
    <link rel="stylesheet" href="./styles/main.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <h1>DeskHub</h1>
            <form id="login-form">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" class="form-control" required placeholder="priya@deskhub.in">
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" class="form-control" required placeholder="demo123">
                </div>
                <button type="submit" class="btn btn-primary" id="login-btn">Login</button>
                <div id="login-error" class="error-message">Invalid email or password.</div>
            </form>
            <p style="margin-top: 1rem; font-size: 0.875rem; color: var(--secondary-color); text-align: center;">
                Hint: priya@deskhub.in / demo123
            </p>
        </div>
    </div>
    <script type="module" src="./src/main.js"></script>
</body>
</html>
